<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>calendar</title>
        <link rel="stylesheet" href="calendar.css">
    </head>
    <body>
        <div class="main">
            <nav class="nav">
                <div class="header">
                    <h1>Student Life Organizer</h1>
                    <h2>Calendar</h2>
                </div>
                <div class="nav-links">
                    <a href="/homepage/index.html">Home</a>
                    <a href="/Notes/viewNotes.html">Notes</a>
                    <a href="/FinancialOverview/financialOverview.html">Finances</a>
                </div>
            </nav>
            <aside class="side-bar">
                <button class="add-event" onclick="openAddEventWindow()">Add Event</button>
            </aside>
            <div class="calendar">
                <div class="month-selector">
                    <button class="prev-month" onclick="lastMonth()">&lt;</button>
                    <p class="month-year" id="month-year"></p>
                    <button class="next-month" onclick="nextMonth()">&gt;</button>
                </div>
                <div class="date-bar">
                    <div class="date">SUN</div>
                    <div class="date">MON</div>
                    <div class="date">TUE</div>
                    <div class="date">WED</div>
                    <div class="date">THUR</div>
                    <div class="date">FRI</div>
                    <div class="date">SAT</div>
                </div>
                <div class="events" id="events">
                </div>
            </div>
        </div>
    </body>
    <script src="calendar.js"></script>
    <script src="event.js"></script>
    <script src="buttonFunctions.js"></script>
</html>
