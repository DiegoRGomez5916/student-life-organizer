<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <form>
            <label for="title">Title:</label><br>
            <input type="text" id="title" name="title" placeholder="Event Title" value="hello"><br>
            <label for="date">Date:</label><br>
            <input type="date" id="date" name="date" value="2026-04-21"><br>
            <label for="start">Start Time:</label><br>
            <input type="time" id="start" name="start" value="10:00"><br>
            <label for="end">End Time:</label><br>
            <input type="time" id="end" name="end" value="22:00"><br>
            <input type="button" value="Delete" onclick="deleteOpenedEvent(window.newIndex)">
            <input type="button" value="Submit" onclick="submitEditButton(window.newEvent)">
        </form>
    </body>
    <script>
        document.getElementById('title').value = window.newEvent.getTitle();
        document.getElementById('date').value = window.newEvent.getDate();
        document.getElementById('start').value = window.newEvent.getStart();
        document.getElementById('end').value = window.newEvent.getEnd();
    </script>
    <script src="calendar.js"></script>
    <script src="event.js"></script>
    <script src="buttonFunctions.js"></script>
</html>
