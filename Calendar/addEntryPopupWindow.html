<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <form>
            <label for="title">Title:</label><br>
            <input type="text" id="title" name="title" placeholder="Event Title" value="hello"><br>
            <label for="date">Date:</label><br>
            <input type="date" id="date" name="date" value="2026-05-21"><br>
            <label for="start">Start Time:</label><br>
            <input type="time" id="start" name="start" value="10:00"><br>
            <label for="end">End Time:</label><br>
            <input type="time" id="end" name="end" value="22:00"><br>
            <input type="button" value="Cancel" onclick="window.close();">
            <input type="button" value="Submit" onclick="submitButton(new Entry())">
        </form>
    </body>
    <script src="calendar.js"></script>
    <script src="buttonFunctions.js"></script>
</html>
