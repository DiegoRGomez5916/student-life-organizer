<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <form>
            <label for="title">Title:</label><br>
            <input type="text" id="title" name="title" placeholder="Entry Title"><br>
            <label for="date">Date:</label><br>
            <input type="date" id="date" name="date"><br>
            <label for="start">Start Time:</label><br>
            <input type="time" id="start" name="start"><br>
            <label for="end">End Time:</label><br>
            <input type="time" id="end" name="end"><br>
            <input type="button" value="Delete" onclick="deleteOpenedEntry(window.newIndex)">
            <input type="button" value="Submit" onclick="submitEditButton(window.newEntry)">
        </form>
    </body>
    <script>
        document.getElementById('title').value = window.newEntry.title;
        document.getElementById('date').value = window.newEntry.date;
        document.getElementById('start').value = window.newEntry.start;
        document.getElementById('end').value = window.newEntry.end;
    </script>
    <script src="calendar.js"></script>
    <script src="buttonFunctions.js"></script>
</html>
