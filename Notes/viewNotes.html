<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>view notes</title>
  <link rel="stylesheet" href="./SLO.css" />
</head>

<body>
  <div class="layout">
    <main class="content">
      <div class="header">
        <div class="header-innner">
            <a href="/homepage/index.html">Home</a>
            <a href="/finace/index.html">Finace</a>
            <a href="/Calendar/index.html">Calendar</a>

          <div id="humberger">
            <div></div><div></div><div></div>
          </div>
        </div>
      </div>

      <div class="body">
        <div class="action">
          <input type="search" id="site-search" name="q" />
          <button type="button">Search</button>
          <button type="button" id="addNoteBtn" class="action-btn">Add Note</button>
          <button type="button" class="action-btn">Create Folder</button>
          <button type="button" class="action-btn">Delete</button>
        </div>

        <div id="notesGrid" class="notes-grid"></div>
      </div>
    </main>
  </div>

  <script>
    const addBtn = document.getElementById("addNoteBtn");
    const notesGrid = document.getElementById("notesGrid");

    addBtn.addEventListener("click", () => {
      const card = document.createElement("div");
      card.className = "note-card";
      card.textContent = "note";
      notesGrid.appendChild(card);
    });
  </script>
</body>
</html>
