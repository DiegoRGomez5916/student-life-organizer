<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>view notes</title>
  <link rel="stylesheet" href="./SLO.css" />
</head>

<body>
  <div class="layout">
    <main class="content">
      <div class="header">
        <div class="header-left">
          <h1 class="site-title">Student Life Organizer</h1>
          <h2 class="page-title">Notes</h2>
        </div>

        <div class="header-right">
          <a href="/homepage/index.html">HomePage</a>
          <a href="/financialOverview.html">Financial Overview</a>
          <a href="/calendar/index.html">Calendar</a>

          <div id="humberger">
            <div></div><div></div><div></div>
          </div>
        </div>
      </div>

      <div class="body">
        <div class="left-logo">
          <span>LOGO</span>
        </div>

        <div class="action">
          <input type="search" id="site-search" name="q" placeholder="Search title" />
          <button type="button" id="searchBtn">Search</button>
          <button type="button" id="addNoteBtn" class="action-btn">Create</button>
          <button type="button" id="editBtn" class="action-btn">Edit</button>
          <button type="button" id="deleteBtn" class="action-btn">Delete</button>
          <button type="button" id="confirmDeleteBtn" class="action-btn">Confirm Delete</button>
        </div>

        <div id="noteForm">
          <input type="text" id="noteNameInput" placeholder="Title" />
          <button type="button" id="createNoteBtn">Create</button>
          <button type="button" id="cancelNoteBtn">Cancel</button>
        </div>

        <div id="editForm">
          <input type="text" id="editNoteInput" placeholder="Edit title" />
          <button type="button" id="saveEditBtn">Save</button>
          <button type="button" id="cancelEditBtn">Cancel</button>
        </div>

        <div id="notesGrid" class="notes-grid"></div>
      </div>
    </main>
  </div>

  <script>
    const addBtn = document.getElementById("addNoteBtn");
    const editBtn = document.getElementById("editBtn");
    const searchBtn = document.getElementById("searchBtn");
    const searchInput = document.getElementById("site-search");
    const deleteBtn = document.getElementById("deleteBtn");
    const confirmDeleteBtn = document.getElementById("confirmDeleteBtn");
    const notesGrid = document.getElementById("notesGrid");

    const noteForm = document.getElementById("noteForm");
    const noteNameInput = document.getElementById("noteNameInput");
    const createNoteBtn = document.getElementById("createNoteBtn");
    const cancelNoteBtn = document.getElementById("cancelNoteBtn");

    const editForm = document.getElementById("editForm");
    const editNoteInput = document.getElementById("editNoteInput");
    const saveEditBtn = document.getElementById("saveEditBtn");
    const cancelEditBtn = document.getElementById("cancelEditBtn");

    const notes = [];
    let deleteMode = false;
    let editMode = false;
    let currentKeyword = "";
    let editingIndex = -1;

    function renderNotes(list) {
      notesGrid.innerHTML = "";

      list.forEach((note) => {
        const originalIndex = notes.indexOf(note);

        const item = document.createElement("div");
        item.className = "note-item";

        const card = document.createElement("div");
        card.className = "note-card";

        const title = document.createElement("div");
        title.className = "note-title";
        title.textContent = note.name;

        card.appendChild(title);
        item.appendChild(card);

        if (editMode) {
          card.classList.add("clickable");

          card.addEventListener("click", () => {
            editingIndex = originalIndex;
            editNoteInput.value = notes[editingIndex].name;
            editForm.classList.add("show");
            editNoteInput.focus();
          });
        }

        if (deleteMode) {
          const checkArea = document.createElement("div");
          checkArea.className = "check-area-outside";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = note.selected;

          checkbox.addEventListener("change", () => {
            note.selected = checkbox.checked;
          });

          checkArea.appendChild(checkbox);
          item.appendChild(checkArea);
        }

        notesGrid.appendChild(item);
      });
    }

    function getFilteredNotes() {
      if (currentKeyword === "") {
        return notes;
      }

      return notes.filter((note) =>
        note.name.toLowerCase().includes(currentKeyword)
      );
    }

    function updateView() {
      renderNotes(getFilteredNotes());
    }

    function resetSelections() {
      notes.forEach((note) => {
        note.selected = false;
      });
    }

    function openNoteForm() {
      noteForm.classList.add("show");
      noteNameInput.value = "";
      noteNameInput.focus();
    }

    function closeNoteForm() {
      noteForm.classList.remove("show");
      noteNameInput.value = "";
    }

    function closeEditForm() {
      editForm.classList.remove("show");
      editNoteInput.value = "";
      editingIndex = -1;
    }

    addBtn.addEventListener("click", () => {
      editMode = false;
      deleteMode = false;
      confirmDeleteBtn.style.display = "none";
      resetSelections();
      updateView();
      openNoteForm();
    });

    createNoteBtn.addEventListener("click", () => {
      const trimmedName = noteNameInput.value.trim();

      if (trimmedName === "") {
        alert("Input title");
        return;
      }

      notes.push({
        name: trimmedName,
        selected: false
      });

      closeNoteForm();
      updateView();
    });

    cancelNoteBtn.addEventListener("click", () => {
      closeNoteForm();
    });

    noteNameInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        createNoteBtn.click();
      }
    });

    editBtn.addEventListener("click", () => {
      deleteMode = false;
      confirmDeleteBtn.style.display = "none";
      resetSelections();
      editMode = true;
      updateView();
    });

    saveEditBtn.addEventListener("click", () => {
      const trimmedName = editNoteInput.value.trim();

      if (trimmedName === "") {
        alert("Input title");
        return;
      }

      if (editingIndex >= 0) {
        notes[editingIndex].name = trimmedName;
      }

      closeEditForm();
      updateView();
    });

    cancelEditBtn.addEventListener("click", () => {
      closeEditForm();
    });

    editNoteInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        saveEditBtn.click();
      }
    });

    function searchNotes() {
      currentKeyword = searchInput.value.trim().toLowerCase();
      updateView();
    }

    searchBtn.addEventListener("click", searchNotes);
    searchInput.addEventListener("input", searchNotes);

    deleteBtn.addEventListener("click", () => {
      editMode = false;
      deleteMode = true;
      confirmDeleteBtn.style.display = "inline-block";
      updateView();
    });

    confirmDeleteBtn.addEventListener("click", () => {
      for (let i = notes.length - 1; i >= 0; i--) {
        if (notes[i].selected) {
          notes.splice(i, 1);
        }
      }

      deleteMode = false;
      confirmDeleteBtn.style.display = "none";
      resetSelections();
      updateView();
    });
  </script>
</body>
</html>
