<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>view notes</title>
  <link rel="stylesheet" href="./notes.css" />
</head>

<body>
  <div class="layout">
    <main class="content">
      <div class="header">
        <div class="header-left">
          <h1 class="site-title">Student Life Organizer</h1>
          <h2 class="page-title">Notes</h2>
        </div>

        <div class="header-right">
          <a href="/homepage/index.html">HomePage</a>
          <a href="/financialOverview.html">Financial Overview</a>
          <a href="/calendar/index.html">Calendar</a>
        </div>
      </div>

      <div class="body">
        <div class="left-logo">
          <span>LOGO</span>
        </div>

        <div class="action">
          <input type="search" id="site-search" name="q" placeholder="Search title" />
          <button type="button" id="searchBtn">Search</button>
          <button type="button" id="addNoteBtn" class="action-btn">Create</button>
          <button type="button" id="deleteBtn" class="action-btn">Delete</button>
          <button type="button" id="confirmDeleteBtn" class="action-btn">Confirm Delete</button>
        </div>

        <div id="noteForm">
          <input type="text" id="noteNameInput" placeholder="Title" />
          <button type="button" id="createNoteBtn">Create</button>
          <button type="button" id="cancelNoteBtn">Cancel</button>
        </div>

        <div id="notesGrid" class="notes-grid"></div>
      </div>
    </main>
  </div>

  <script src="./viewNotes.js"></script>
</body>
</html>
