<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Financial Overview</title>
    <link rel="stylesheet" href="financialOverview.css">

    <script>
    function openTransactionPopup(mode = "add", index = null){
        // opens the transactions popup window
        // with no args, default is add mode with no index
        //    - this is when you are adding a new transaction
        // in edit mode, there will be an index
      const params = new URLSearchParams({ mode }); // creates a url search parameter based on mode

      if (index !== null){
        params.append("index", index); // if there is an index, append it to the search parameter
      }

      const url = `addTransactionPopup.html?${params.toString()}`; // create url

      window.open(url, "transactionPopupWindow", "width=500,height=560,left=200,top=150,resizable=yes,scrollbars=yes"); 
        // open transaction popup window
}
    </script>
  </head>

  <body>
    <div class="page">
      <header class="topbar">
        <div class="titles">
          <h1>Student Life Organizer</h1>
          <h2>Financial Overview</h2>
        </div>

        <nav class="navrow" aria-label="Primary">
          <a href="../homepage/index.html">HomePage</a>
          <a href="../Notes/viewNotes.html">View Notes</a>
          <a href="../Calendar/calendar.html">Calendar</a>
        </nav>
      </header>

      <main class="content">
        <div class="layout">
          <!-- <div class="logo">LOGO</div> -->

          <section class="summary" aria-label="Savings summary">
            <h2 id="balance">Total Balance: $0.00</h2>
          </section>

          <section class="actions" aria-label="Actions">
            <button onclick="openTransactionPopup('add')" class="btn" id="addTransactionBtn">
              Add Transaction
            </button>
          </section>

          <section class="list-card" aria-label="Transaction list">
            <div class="list-inner">
              <div class="list-title">Transaction<br />List</div>
              <div class="search-wrap">
                <label for="transactionSearch" class="sr-only">Search transactions</label>
                <input
                  type="text"
                  id="transactionSearch"
                  class="search-input"
                  placeholder="Search transactions..."
                  aria-label="Search transactions"
                />
              </div>
              <ul id="transactionList" class="transaction-list"></ul>
            </div>
          </section>
        </div>
      </main>

      <script src="financialTracker.js"></script>
    </div>
  </body>
</html>
