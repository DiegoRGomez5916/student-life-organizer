<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Financial Overview</title>
    <link rel="stylesheet" href="financialOverview.css">
    <!-- Script for opening the popupwindow -->
    <script>
      function openAddTransactionPopup() {
      window.open(
        "addTransactionPopUp.html",
        "myPopupWindow",
        "width=500,height=500,left=200,top=150,resizable=yes,scrollbars=yes"
      );
      }
  </script>
 </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="titles">
          <h1>Student Life Organizer</h1>
          <h2>Finanical Overview</h2>
        </div>
        <nav class="navrow" aria-label="Primary">
          <a href="../homepage/index.html">HomePage</a>
          <a href="../Notes/viewNotes.html">View Notes</a>
          <a href="../Calendar/calendar.html">Calendar</a>
          <!-- <div class="hamburger" aria-label="Menu" role="button" tabindex="0"> -->
            <span></span><span></span><span></span>
          </div>
        </nav>
      </header>

      <main class="content">
        <div class="layout">
          <div class="logo">LOGO</div>

          <section class="summary" aria-label="Savings summary">
            <h2 id="balance">Total Balance: $0</h2>
          </section>

          <section class="actions" aria-label="Actions">
            <button onclick="openAddTransactionPopup()" class="btn" id="addTransactionBtn">
              Add Transaction
            </button>
            <button class="btn">Delete Transaction</button>
            <button class="btn">Edit Transaction</button>
          </section>

          <section class="list-card" aria-label="Transaction list">
            <div class="list-inner">
              <div class="list-title">Transaction<br />List</div>
              <ul id="transactionList"></ul>
                <!-- <li>hello world</li>
                <li>hello other world</li> -->
            </div>
          </section>
        </div>
      </main>
      <script src="financialTracker.js"></script>
    </div>
  </body>
</html>
