<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Transaction</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
    }

    .button-group {
      margin-top: 16px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>Add Transaction</h2>

  <div class="form-group">
    <label for="transactionName">Name</label>
    <input type="text" id="transactionName" />
  </div>

  <div class="form-group">
    <label for="transactionDescription">Description</label>
    <textarea id="transactionDescription"></textarea>
  </div>

  <div class="form-group">
    <label for="transactionPrice">Price</label>
    <input type="number" id="transactionPrice" step="0.01" />
  </div>

  <div class="button-group">
    <button onclick = "addToList(); window.close()" id="submitBtn">Submit</button>
    <button onclick = "window.close(transactionList)" id="closeBtn" type="button">Close</button>
  </div>

  <!-- <script type="module" src="popup.js"></script> -->
   <script>
    function addToList(listId, text) {
      const list = document.getElementById(listId);

      if (!list) {
        console.error("List not found:", listId);
        return;
      }

      const li = document.createElement("li");
      li.textContent = text;

      list.appendChild(li);
}
   </script>
</body>
</html>
