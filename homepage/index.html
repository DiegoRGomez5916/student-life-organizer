<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Life Organizer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Student Life Organizer</h1>

    <nav>
        <a href="/Notes/viewNotes.html">Notes</a>
        <a href="/Calendar/calendar.html">Calendar</a>
        <a href="/FinancialOverview/financialOverview.html">Finances</a>
    </nav>
</header>


<main class="container">

    <!-- Notes -->
    <div class="card">
        <h2>Recent Notes</h2>

        <ul>
            <li>Recent note 1</li>
            <li>Recent note 2</li>
            <li>Recent note 3</li>
        </ul>

        <button>Add Note</button>
    </div>


    <!-- Events -->
    <div class="card">
        <h2>Upcoming Events</h2>

        <ul>
            <li>Upcoming event 1</li>
            <li>Upcoming event 2</li>
            <li>Upcoming event 3</li>
        </ul>

        <button>Add Event</button>
    </div>


    <!-- Finances -->
    <div class="card">
        <h2>Financial Overview</h2>

        <p>Monthly total:</p>
        <h3>$1234</h3>

        <p>Recent transactions:</p>

        <ul>
            <li>Groceries</li>
            <li>Books</li>
            <li>Gas</li>
        </ul>

        <button>Add Transaction</button>
    </div>

</main>

</body>
</html>
