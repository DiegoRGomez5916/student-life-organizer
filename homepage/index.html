<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Life Organizer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Student Life Organizer</h1>

    <nav>
        <a href="/Notes/viewNotes.html">Notes</a>
        <a href="/Calendar/calendar.html">Calendar</a>
        <a href="/FinancialOverview/financialOverview.html">Finances</a>
    </nav>
</header>


<main class="container">

    <!-- Notes -->
    <div class="card">
        <h2>Recent Notes</h2>

        <ul>
            <li id="note1">Recent note 1</li>
            <li id="note2">Recent note 2</li>
            <li id="note3"></li>
        </ul>

        <button type="button" onclick="createNoteFromHome()">Add Note</button>
    </div>


    <!-- Events -->
    <div class="card">
        <h2>Upcoming Events</h2>

        <ul id="upcomingEventList">
        </ul>

        <button onclick="openAddEntryWindow();updateUpcomingEntries();">Add Event</button>
    </div>


    <!-- Finances -->
    <div class="card">
        <h2>Financial Overview</h2>

        <p>Balance Total:</p>
        <h3 id = "BalanceTotal"></h3>

        <p>Recent transactions:</p>

        <ul>
            <li id = "t1"></li>
            <li id = "t2"></li>
            <li id = "t3"></li>
        </ul>
        <script>
            function addTransaction(){
                // opens transaction window from homepage
                const url = `../FinancialOverview/addTransactionPopup.html`; // create url

                window.open(url, "transactionPopupWindow", "width=500,height=560,left=200,top=150,resizable=yes,scrollbars=yes"); 
                    // open transaction popup window
            }
        </script>

        <button onclick = "addTransaction()">Add Transaction</button>
        <script src="../FinancialOverview/financialTracker.js"></script>
        <script>
            window.tracker.updateHomeUI(); // update balance and recent transactions
        </script>
    </div>

</main>
    <script src="../Calendar/calendar.js"></script>
    <script src="../Calendar/buttonFunctions.js"></script>
    <script>
        window.calendar = new Calendar();
        function updateUpcomingEntries(){
            const eventList = document.getElementById('upcomingEventList');
            const upcomingEvents = window.calendar.getUpcomingEntrys();
            let eventString = ``;
            for (let i = 0; i < upcomingEvents.length; i++){
                eventString = eventString + `<li>${upcomingEvents[i].title}: ${upcomingEvents[i].date}</li>`
            }
            eventList.innerHTML = eventString;
        }
        updateUpcomingEntries();
        let notes = JSON.parse(localStorage.getItem("notes"));
        document.getElementById('note1').innerText = notes[0].name;
        document.getElementById('note2').innerText = notes[1].name;
        document.getElementById('note3').innerText = notes[2].name;
    </script>

</body>
</html>
